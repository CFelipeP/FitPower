<VirtualHost *:8080>
    ServerName 192.168.0.14
    ServerAlias fitpower.duckdns.org

    DocumentRoot /var/www/fitpower/public

    <Directory /var/www/fitpower/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        FallbackResource /index.html
    </Directory>

    Alias /api /var/www/fitpower/api

    <Directory /var/www/fitpower/api>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/fitpower/api/uploads>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/fitpower-error.log
    CustomLog ${APACHE_LOG_DIR}/fitpower-access.log combined
</VirtualHost>

<VirtualHost *:8443>
    ServerName fitpower.duckdns.org

    DocumentRoot /var/www/fitpower/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/fitpower.duckdns.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/fitpower.duckdns.org/privkey.pem

    <Directory /var/www/fitpower/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        FallbackResource /index.html
    </Directory>

    Alias /api /var/www/fitpower/api

    <Directory /var/www/fitpower/api>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/fitpower/api/uploads>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/fitpower-error.log
    CustomLog ${APACHE_LOG_DIR}/fitpower-access.log combined
</VirtualHost>
