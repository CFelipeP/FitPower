<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitPower — Offline</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .offline-container { text-align: center; max-width: 400px; }
        .offline-icon { width: 80px; height: 80px; background: #FFD600; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 36px; color: #000; font-weight: bold; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #888; margin-bottom: 24px; line-height: 1.6; }
        .offline-retry { padding: 12px 32px; background: #FFD600; color: #000; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .offline-cached { margin-top: 32px; padding-top: 24px; border-top: 1px solid #222; }
        .offline-cached h3 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .offline-cached a { display: block; color: #FFD600; text-decoration: none; padding: 8px; border-radius: 8px; transition: background 0.2s; }
        .offline-cached a:hover { background: #111; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">⚡</div>
        <h1>You're Offline</h1>
        <p>Don't worry — your progress is saved locally. Connect to the internet to sync.</p>
        <button class="offline-retry" onclick="window.location.reload()">Try Again</button>
        <div class="offline-cached" id="cached-pages">
            <h3>Available Offline</h3>
            <a href="/">Home</a>
            <a href="/client/dashboard">Dashboard</a>
            <a href="/login">Login</a>
        </div>
    </div>
</body>
</html>
