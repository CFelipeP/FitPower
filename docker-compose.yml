services:
  php:
    build:
      context: ./api
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
        - linux/amd64
    volumes:
      - ./api:/var/www/api
    working_dir: /var/www/api
    environment:
      DB_HOST: db
      DB_NAME: fitpower
      DB_USER: fitpower
      DB_PASS: ${DB_PASS}
    depends_on:
      db:
        condition: service_started
    networks:
      - fitpower

  db:
    image: mariadb:11
    platform: linux/arm64
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: fitpower
      MYSQL_USER: fitpower
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - fitpower

  nginx:
    image: nginx:alpine
    platform: linux/arm64
    ports:
      - "8080:8080"
    volumes:
      - ./FitPower/dist:/var/www/html:ro
      - ./api:/var/www/api:ro
      - ./api/uploads:/var/www/api/uploads
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - fitpower

  chat:
    image: node:20-alpine
    platform: linux/arm64
    working_dir: /app
    volumes:
      - ./FitPower:/app
    command: sh -c "npm install --omit=dev 2>/dev/null; node chat-server.js"
    ports:
      - "5180:5180"
    environment:
      API_BASE_URL: http://nginx:8080
    depends_on:
      - nginx
    networks:
      - fitpower

  node:
    build:
      context: .
      dockerfile: Dockerfile.node
      platforms:
        - linux/arm64
    working_dir: /app
    volumes:
      - ./FitPower:/app
    command: sh -c "npm install 2>/dev/null && node mediasoup-server.js"
    ports:
      - "5181:5181"
    environment:
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_IP}
      API_BASE_URL: http://nginx:8080
    depends_on:
      - nginx
    networks:
      - fitpower

volumes:
  db_data:

networks:
  fitpower:
