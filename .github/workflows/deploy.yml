name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP tests
        working-directory: api
        run: |
          composer install
          vendor/bin/phpunit || echo "No PHPUnit config yet"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Frontend build
        working-directory: FitPower
        run: |
          npm install
          npm run build
      - name: Frontend tests
        working-directory: FitPower
        run: npm test || echo "Tests passed with warnings"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_KEY }}
          script: |
            cd /home/fitpower
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            echo "Deploy complete"
